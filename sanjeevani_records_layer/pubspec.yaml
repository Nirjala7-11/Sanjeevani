name: sanjeevani_records
description: >
  Data and records layer for Sanjeevani. Manages the SQLite database,
  patient records, visit logs, assessments, scheduled reminders,
  anonymized sync queue, and the medical knowledge base.
version: 1.0.0

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  path: ^1.9.0
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  assets:
    - data/knowledge_base.json
